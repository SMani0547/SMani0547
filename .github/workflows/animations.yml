name: Generate contribution animations

on:
  schedule:
    # Run every 12 hours, at minute 17.
    - cron: "17 */12 * * *"

  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "README.md"
      - ".github/workflows/animations.yml"

permissions:
  contents: write

concurrency:
  group: profile-contribution-animations
  cancel-in-progress: true

jobs:
  generate:
    name: Generate profile animations
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate Pac-Man contribution graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}
          games: "pacman"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Snake contribution graph
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish animations to output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
          commit_message: "Update profile contribution animations"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
